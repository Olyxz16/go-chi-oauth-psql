apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: template
  labels:
    app: template-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: template-api
  template:
    metadata:
      labels:
        app: template-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/olyxz16/go-chi-oauth-psql/api:latest
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: user-pass
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: token-secret
            - name: GOOGLE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: google-access-key-id
            - name: GOOGLE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: google-secret-access-key
          envFrom:
            - configMapRef:
                name: api-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
