apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: template
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: Never
      containers:
        - name: migration
          image: ghcr.io/olyxz16/go-chi-oauth-psql/migration:latest
          env: 
            - name: "DATABASE_URL"
              valueFrom:
                secretKeyRef:
                  name: "postgres-secrets"
                  key: ""
