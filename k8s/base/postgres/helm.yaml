apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
spec:
  interval: 1h
  url: oci://registry-1.docker.io/bitnamicharts
  type: oci

---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: database
spec:
  interval: 5m
  chart:
    spec:
      chart: postgresql
      version: "18.5.14"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    global:
      postgresql:
        auth:
          database: "database"
          username: "user"
          existingSecret: "postgres-credentials"
          secretKeys:
            adminPasswordKey: "admin-pass"
            userPasswordKey: "user-pass"
    primary:
      persistence:
        size: 8Gi
