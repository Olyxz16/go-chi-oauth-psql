apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
spec:
  interval: 1h
  url: oci://registry-1.docker.io/bitnamicharts
  type: oci

---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: template
spec:
  interval: 5m
  chart:
    spec:
      chart: redis
      version: ">= 25.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: bitnami/redis
      tag: latest
    auth:
      enabled: true
      existingSecret: redis-secrets
      existingSecretPasswordKey: redis-password
    master:
      persistence:
        size: 2Gi
    replica:
      replicaCount: 0
