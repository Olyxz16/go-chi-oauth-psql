apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: chainguard
  namespace: flux-system
spec:
  interval: 1h
  type: oci
  url: oci://cgr.dev/chainguard/charts

---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: template
spec:
  interval: 5m
  chart:
    spec:
      chart: redis
      version: ">= 1.0.0"
      sourceRef:
        kind: HelmRepository
        name: chainguard
        namespace: flux-system
  values:
    auth:
      enabled: true
      existingSecret: redis-secrets
      existingSecretPasswordKey: redis-password
    master:
      persistence:
        size: 2Gi
    replica:
      replicaCount: 0
