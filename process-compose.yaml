version: "0.5"

processes:
  postgres:
    command: |
      set -e
      PGDATA="$HOME/.local/share/devbox-postgres"

      # Initialise the data directory on first run
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb --pgdata="$PGDATA" --username=postgres --auth=trust --no-instructions
        echo "host all all 127.0.0.1/32 trust" >> "$PGDATA/pg_hba.conf"
      fi

      # Start postgres in the foreground
      postgres -D "$PGDATA" -k "$PGDATA" -p 5432
    shutdown:
      command: pg_ctl stop -D "$HOME/.local/share/devbox-postgres" -m fast
      signal: 15
    readiness_probe:
      exec:
        command: pg_isready -h 127.0.0.1 -p 5432 -U postgres
      initial_delay_seconds: 2
      period_seconds: 3
    availability:
      restart: "on_failure"

  create-db:
    command: |
      psql -h 127.0.0.1 -p 5432 -U postgres \
        -tc "SELECT 1 FROM pg_database WHERE datname='app'" \
        | grep -q 1 || psql -h 127.0.0.1 -p 5432 -U postgres -c "CREATE DATABASE app;"
    depends_on:
      postgres:
        condition: process_healthy
    availability:
      restart: "on_failure"
